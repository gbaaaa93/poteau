<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#94FB2D",
                        "background-light": "#F8FAFC",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light font-display text-slate-900 antialiased">
    <div class="relative mx-auto min-h-screen max-w-[480px] bg-background-light flex flex-col pb-24 shadow-2xl">

        <!-- Header -->
        <header class="sticky top-0 z-50 bg-background-light/80 backdrop-blur-md px-4 py-6 border-b border-slate-200">
            <div class="flex items-center justify-between">
                <button onclick="history.back()"
                    class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200 text-slate-900">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h1 class="text-lg font-bold">Organiser un Match</h1>
                <div class="w-10"></div>
            </div>
        </header>

        <main class="p-6 space-y-8">
            <!-- Game Type Selector -->
            <div class="flex p-1 bg-slate-200 rounded-2xl border border-slate-200">
                <button id="tab-five" onclick="switchSport('Five')"
                    class="flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-primary text-black">Five
                    (Football)</button>
                <button id="tab-padel" onclick="switchSport('Padel')"
                    class="flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-900">Padel</button>
            </div>

            <!-- Nom du Five/Padel -->
            <section>
                <label id="sport-name-label"
                    class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Nom du Five</label>
                <input type="text" id="match-name" placeholder="Ex: Urban Soccer Aubervilliers"
                    class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 focus:ring-primary focus:border-primary outline-none">
            </section>

            <!-- Localisation -->
            <section>
                <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Ville</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">location_on</span>
                    <select id="match-city"
                        class="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-4 py-3 appearance-none outline-none focus:ring-primary">
                        <option>Paris</option>
                        <option>Lyon</option>
                        <option>Marseille</option>
                        <option>Bordeaux</option>
                    </select>
                </div>
            </section>

            <!-- Horaires & Durée -->
            <section class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Heure</label>
                    <input type="time" id="match-time"
                        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Durée</label>
                    <select id="match-duration"
                        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-primary">
                        <option value="60">60 min</option>
                        <option value="90">90 min</option>
                        <option value="120">120 min</option>
                    </select>
                </div>
            </section>

            <!-- Prix -->
            <section>
                <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Prix par personne
                    (€)</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">payments</span>
                    <input type="number" id="match-price" placeholder="12"
                        class="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-4 py-3 outline-none focus:ring-primary">
                </div>
            </section>

            <section>
                <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Lien de
                    paiement</label>
                <p class="text-[10px] text-slate-500 mb-2">Les joueurs utiliseront ce lien pour payer avant de
                    rejoindre.</p>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">link</span>
                    <input type="url" id="match-payment-link" placeholder="https://www.lefive.fr/"
                        class="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-4 py-3 outline-none focus:ring-primary">
                </div>
            </section>

            <!-- Submit Button -->
            <button onclick="publishMatch()" id="publish-btn"
                class="w-full bg-primary text-black font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all">
                Publier le Match
            </button>
        </main>

        <!-- Navigation -->
        <nav
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-background-light border-t border-slate-200 px-6 py-3 flex justify-between items-center z-50">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-medium">Accueil</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="dashboard.html">
                <span class="material-symbols-outlined">explore</span>
                <span class="text-[10px] font-medium">Matchs</span>
            </a>
            <div class="relative -top-8">
                <a href="create_match.html"
                    class="w-14 h-14 bg-primary text-black rounded-full shadow-lg shadow-primary/40 flex items-center justify-center border-4 border-background-light">
                    <span class="material-symbols-outlined text-2xl font-bold">add</span>
                </a>
            </div>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="community.html">
                <span class="material-symbols-outlined text-gray-400">forum</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Chat</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="profile.html">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </nav>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('fivender_current_user'));
        if (!currentUser) window.location.href = 'login.html';

        let selectedSport = 'Five';

        function switchSport(sport) {
            selectedSport = sport;
            const tabFive = document.getElementById('tab-five');
            const tabPadel = document.getElementById('tab-padel');
            const label = document.getElementById('sport-name-label');
            const input = document.getElementById('match-name');
            const inputPayment = document.getElementById('match-payment-link');

            if (sport === 'Five') {
                tabFive.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-primary text-black";
                tabPadel.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-900";
                label.innerText = "Nom du Five";
                input.placeholder = "Ex: Urban Soccer Aubervilliers";
                inputPayment.placeholder = "https://www.lefive.fr/";
            } else {
                tabPadel.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-primary text-black";
                tabFive.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-900";
                label.innerText = "Nom du Club de Padel";
                input.placeholder = "Ex: Padel Horizon";
                inputPayment.placeholder = "https://www.4padel.fr/";
            }
        }

        function publishMatch() {
            const btn = document.getElementById('publish-btn');

            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span> Publication en cours...';
            btn.disabled = true;
            btn.classList.add('opacity-80');

            // Simulation d'enregistrement
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>
</body>

</html>
