<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#94FB2D",
                        "background-light": "#F8FAFC",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light text-slate-900 antialiased overflow-x-hidden">
    <div class="relative mx-auto h-screen max-w-[480px] bg-background-light flex flex-col shadow-2xl overflow-hidden">

        <!-- Header -->
        <header
            class="sticky top-0 z-50 bg-background-light/80 backdrop-blur-md px-4 py-4 border-b border-slate-100 flex items-center justify-between">
            <h2 class="text-slate-900 text-lg font-black italic uppercase tracking-tighter flex-1 text-center">Communauté Fivender</h2>
            <div class="size-10 flex items-center justify-center bg-slate-100 rounded-full">
                <span class="material-symbols-outlined text-slate-900">forum</span>
            </div>
        </header>

        <!-- Chat Area -->
        <main id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar pb-24">
            <!-- System message -->
            <div class="flex justify-center">
                <span class="text-[9px] font-black px-4 py-1 rounded-full bg-primary/10 text-primary uppercase tracking-widest">Chat Global • Paris</span>
            </div>

            <!-- Pre-filled messages -->
            <div class="flex items-end gap-3 max-w-[85%]">
                <div class="size-8 rounded-xl bg-slate-200 flex-shrink-0 flex items-center justify-center font-black text-[10px]">ML</div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-slate-400 ml-1">MARC • 15:30</p>
                    <div class="bg-white border border-slate-100 p-4 rounded-3xl rounded-bl-none shadow-sm">
                        <p class="text-xs font-semibold text-slate-900 leading-relaxed">Quelqu'un de motivé pour un padel à Fontenay demain ? 🎾</p>
                    </div>
                </div>
            </div>

            <div class="flex items-end gap-3 max-w-[85%]">
                <div class="size-8 rounded-xl bg-slate-200 flex-shrink-0 flex items-center justify-center font-black text-[10px]">SD</div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-slate-400 ml-1">SARAH • 15:42</p>
                    <div class="bg-white border border-slate-100 p-4 rounded-3xl rounded-bl-none shadow-sm">
                        <p class="text-xs font-semibold text-slate-900 leading-relaxed">Je suis dispo ! On crée un match ?</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Bar -->
        <footer class="fixed bottom-16 left-1/2 -translate-x-1/2 w-full max-w-[480px] p-4 bg-white/80 backdrop-blur-sm border-t border-slate-100 z-40">
            <div class="flex items-center gap-3">
                <input type="text" id="chat-input" placeholder="Parle à la communauté..."
                    class="flex-1 bg-slate-50 border border-slate-100 rounded-2xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all border-none">
                <button onclick="sendMessage()"
                    class="size-12 rounded-full bg-slate-900 flex items-center justify-center text-primary shadow-xl shadow-slate-900/10 active:scale-90 transition-transform">
                    <span class="material-symbols-outlined font-black">send</span>
                </button>
            </div>
        </footer>

        <!-- Navigation Bar -->
        <nav
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-background-light border-t border-slate-200 px-6 py-3 flex justify-between items-center z-50">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="dashboard.html">
                <span class="material-symbols-outlined">explore</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Matchs</span>
            </a>
            <div class="relative -top-8">
                <a href="create_match.html"
                    class="w-14 h-14 bg-primary text-black rounded-full shadow-xl shadow-primary/40 flex items-center justify-center border-4 border-background-light transform transition-transform active:scale-90">
                    <span class="material-symbols-outlined text-2xl font-black">add</span>
                </a>
            </div>
            <a class="flex flex-col items-center gap-1 text-primary" href="community.html">
                <span class="material-symbols-outlined fill-1">forum</span>
                <span class="text-[10px] font-extrabold uppercase tracking-tighter">Chat</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="profile.html">
                <span class="material-symbols-outlined font-black">person</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Profil</span>
            </a>
        </nav>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('fivender_current_user'));
        if (!currentUser) window.location.href = 'login.html';

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const container = document.getElementById('chat-messages');
            const msgHtml = `
                <div class="flex items-end justify-end gap-3 ml-auto max-w-[85%]">
                    <div class="space-y-1 text-right">
                        <p class="text-[10px] font-black text-slate-400 mr-1">MOI • ${new Date().getHours()}:${new Date().getMinutes().toString().padStart(2, '0')}</p>
                        <div class="bg-primary p-4 rounded-3xl rounded-br-none shadow-xl shadow-primary/10">
                            <p class="text-xs font-black italic text-black leading-relaxed">${text}</p>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', msgHtml);
            input.value = '';
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
