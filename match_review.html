<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#94FB2D",
                        "background-light": "#F8FAFC",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .rating-btn.active {
            background-color: #94FB2D;
            color: black;
            border-color: #94FB2D;
            box-shadow: 0 4px 15px rgba(148, 251, 45, 0.4);
        }
    </style>
</head>

<body class="bg-background-light text-slate-900 antialiased overflow-x-hidden">
    <div class="relative mx-auto min-h-screen max-w-[480px] bg-background-light flex flex-col pb-24 shadow-2xl">

        <!-- Header -->
        <header
            class="sticky top-0 z-50 bg-background-light/80 backdrop-blur-md px-4 py-4 border-b border-slate-100 flex items-center justify-between">
            <button onclick="history.back()"
                class="flex size-10 items-center justify-center bg-slate-100 rounded-full transition-colors active:scale-95">
                <span class="material-symbols-outlined text-slate-900">arrow_back</span>
            </button>
            <h2 class="text-slate-900 text-lg font-black italic uppercase tracking-tighter flex-1 text-center">Noter les
                Joueurs</h2>
            <div class="size-10"></div>
        </header>

        <main class="flex-1 px-6 py-6 space-y-6">
            <!-- Match Recap -->
            <div
                class="bg-white rounded-[2rem] p-5 shadow-xl shadow-slate-200/50 border border-slate-50 flex items-center gap-4">
                <div class="size-14 rounded-2xl bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-3xl" id="match-icon">sports_soccer</span>
                </div>
                <div>
                    <h2 id="match-name" class="font-black text-lg italic tracking-tighter uppercase leading-none mb-1">
                        Five Paris 13</h2>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Score: <span
                            class="text-primary" id="match-score">8 - 5</span> • Terminée</p>
                </div>
            </div>

            <!-- Tactical Field -->
            <div class="relative aspect-[4/5] w-full rounded-[2.5rem] overflow-hidden border-4 border-white shadow-2xl shadow-slate-300 relative"
                id="tactical-field">
                <!-- Field content will be injected by JS -->
            </div>

            <div class="bg-primary/5 rounded-2xl p-4 border border-primary/10">
                <p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] leading-relaxed">
                    Touchez un coéquipier pour booster sa note globale <br> ou partager une critique
                </p>
            </div>
        </main>

        <!-- Rating Modal (Hidden by default) -->
        <div id="rating-modal"
            class="fixed inset-0 z-[200] flex items-end justify-center bg-slate-900/40 backdrop-blur-xl opacity-0 pointer-events-none transition-opacity duration-300">
            <div
                class="w-full max-w-[480px] bg-white rounded-t-[3rem] p-8 pb-12 translate-y-full transition-transform duration-300 border-t border-slate-100">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>

                <div class="flex items-center gap-5 mb-8">
                    <div class="relative">
                        <img id="modal-player-img" src=""
                            class="size-20 rounded-3xl object-cover border-4 border-primary shadow-lg">
                        <div
                            class="absolute -bottom-2 -right-2 size-8 bg-white rounded-full flex items-center justify-center shadow-md">
                            <span class="material-symbols-outlined text-primary text-sm fill-1">verified</span>
                        </div>
                    </div>
                    <div>
                        <h3 id="modal-player-name"
                            class="text-2xl font-black italic uppercase tracking-tighter leading-none mb-1 text-slate-900">
                            Thomas L.</h3>
                        <p id="modal-player-pos"
                            class="text-xs font-black text-slate-400 uppercase tracking-widest leading-none">Milieu
                            Gauche</p>
                    </div>
                </div>

                <div class="space-y-8">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Note
                            de performance</label>
                        <div class="grid grid-cols-5 gap-2">
                            <button onclick="selectRating(1)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">1</button>
                            <button onclick="selectRating(2)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">2</button>
                            <button onclick="selectRating(3)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">3</button>
                            <button onclick="selectRating(4)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">4</button>
                            <button onclick="selectRating(5)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">5</button>
                            <button onclick="selectRating(6)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">6</button>
                            <button onclick="selectRating(7)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">7</button>
                            <button onclick="selectRating(8)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">8</button>
                            <button onclick="selectRating(9)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">9</button>
                            <button onclick="selectRating(10)"
                                class="rating-btn py-3 rounded-2xl bg-slate-50 border border-slate-100 text-sm font-black text-slate-900 transition-all">10</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Ton
                            commentaire</label>
                        <textarea placeholder="Super vision de jeu, très bon coéquipier..."
                            class="w-full bg-slate-50 border border-slate-100 rounded-[1.5rem] p-5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 h-28 resize-none text-slate-900 placeholder:text-slate-300"></textarea>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="closeRatingModal()"
                            class="flex-1 py-5 rounded-2xl bg-slate-100 text-slate-400 font-extrabold text-[10px] uppercase tracking-widest">Fermer</button>
                        <button onclick="submitRating()"
                            class="flex-[2] py-5 rounded-2xl bg-slate-900 text-primary font-black text-[10px] uppercase tracking-[0.2em] shadow-xl shadow-slate-900/10">Valider
                            la Note</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-background-light border-t border-slate-200 px-6 py-3 flex justify-between items-center z-50">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary" href="dashboard.html">
                <span class="material-symbols-outlined fill-1">explore</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Matchs</span>
            </a>
            <div class="relative -top-8">
                <a href="create_match.html"
                    class="w-14 h-14 bg-primary text-black rounded-full shadow-xl shadow-primary/40 flex items-center justify-center border-4 border-background-light transform transition-transform active:scale-90">
                    <span class="material-symbols-outlined text-2xl font-black">add</span>
                </a>
            </div>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="alert.html">
                <span class="material-symbols-outlined">notifications</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Alertes</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="profile.html">
                <span class="material-symbols-outlined font-black">person</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Profil</span>
            </a>
        </nav>
    </div>

    <script>
        const players = [
            { id: 1, name: "Lucas R.", pos: "Attaquant", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuDpQsQymDQ1SjAD8ByEG1yEduYB7PucBBcB4xciuyyzn-Gi5pARQ044viO9up1Y9iWg4StjKzpGOCqGaeNkA1eL5LR7cq7Yq2_1cvvQEx_FHaF6586s7Skxsu7JAdfjPLD5jdpczJ9JSSYI9-RpCQuL-R6Z4Zh9Bpbo9ZEMLBMt8fcqD012cNDCYrXkrNasO5bMHdbxi9j9P_cOVbdlmM8l0yQ8isw50_CzVVz9CmrhjDqx1xU6RxSM2nVHYxYsbFY6NUaZUc785g", x: 50, y: 15 },
            { id: 2, name: "Karim B.", pos: "Milieu", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuDrgHbcDJ-xMdGVUbLkAT28g6uffvBLB-q5PLvaRv7rH0ZNmp_gmbJBaq42gBYJvq_refehzyhZrFBTz6RK_49P_ekooF5Tu_uuBmCXA543nabFWHZI_MUIIj8RZmBCU4qC83kuCVsmF05YhtIUs4cJM-NagNHawD7yz3AAh4u8wxeaeutrnW4lTVU0K5-2SoM-xO9ZkAOD16Atnyn0xMlSOy_E_tQLaLP9JbI43rFs1qwk0g7zTGXAtozBtM-0HeHdHDkV-7KJyA", x: 25, y: 35 },
            { id: 3, name: "Alex M.", pos: "Milieu", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuDrgHbcDJ-xMdGVUbLkAT28g6uffvBLB-q5PLvaRv7rH0ZNmp_gmbJBaq42gBYJvq_refehzyhZrFBTz6RK_49P_ekooF5Tu_uuBmCXA543nabFWHZI_MUIIj8RZmBCU4qC83kuCVsmF05YhtIUs4cJM-NagNHawD7yz3AAh4u8wxeaeutrnW4lTVU0K5-2SoM-xO9ZkAOD16Atnyn0xMlSOy_E_tQLaLP9JbI43rFs1qwk0g7zTGXAtozBtM-0HeHdHDkV-7KJyA", x: 75, y: 35 },
            { id: 4, name: "Julien S.", pos: "Défenseur", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuCwUUVSbYaltBFHB0RinTwIb1mHobHS3t1aFejLZW7KSTwiQAOxHqTmVxhhdmsTNUEI0_UHaDbPWBhPOr9y1l6SakCMkvC2H307S91FtDJ5SqvdxNdIVU4ywSnORHQKxdONdUkJrUX0Xn_o29ELszE_i3ZuI40HbEMddrFpFr9mu-EXU53aH8oRP6ykfUJi_Ce9j84Ij2AFu6c8SA4eFdaL0ug5xywxhkgQFxeew4gxRY9gdnNtUpf4Gfedwx9v00mCqa2UWnM0LA", x: 35, y: 65 },
            { id: 5, name: "Yassine K.", pos: "Défenseur", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuDpQsQymDQ1SjAD8ByEG1yEduYB7PucBBcB4xciuyyzn-Gi5pARQ044viO9up1Y9iWg4StjKzpGOCqGaeNkA1eL5LR7cq7Yq2_1cvvQEx_FHaF6586s7Skxsu7JAdfjPLD5jdpczJ9JSSYI9-RpCQuL-R6Z4Zh9Bpbo9ZEMLBMt8fcqD012cNDCYrXkrNasO5bMHdbxi9j9P_cOVbdlmM8l0yQ8isw50_CzVVz9CmrhjDqx1xU6RxSM2nVHYxYsbFY6NUaZUc785g", x: 65, y: 65 },
            { id: 6, name: "Thomas L.", pos: "Moi", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuCwUUVSbYaltBFHB0RinTwIb1mHobHS3t1aFejLZW7KSTwiQAOxHqTmVxhhdmsTNUEI0_UHaDbPWBhPOr9y1l6SakCMkvC2H307S91FtDJ5SqvdxNdIVU4ywSnORHQKxdONdUkJrUX0Xn_o29ELszE_i3ZuI40HbEMddrFpFr9mu-EXU53aH8oRP6ykfUJi_Ce9j84Ij2AFu6c8SA4eFdaL0ug5xywxhkgQFxeew4gxRY9gdnNtUpf4Gfedwx9v00mCqa2UWnM0LA", x: 50, y: 85 }
        ];

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type') || 'Football';
            const field = document.getElementById('tactical-field');
            const matchName = document.getElementById('match-name');
            const matchIcon = document.getElementById('match-icon');
            const matchScore = document.getElementById('match-score');

            if (type === 'Padel') {
                field.style.backgroundColor = "#005bb7";
                matchName.innerText = "Padel Horizon";
                matchIcon.innerText = "sports_tennis";
                matchScore.innerText = "2 - 1 (SETS)";
                renderPadelLayout(field);
            } else {
                field.style.backgroundColor = "#028a0f";
                renderFootballLayout(field);
            }
        };

        function renderFootballLayout(field) {
            field.innerHTML = `
                <div class="absolute inset-x-8 inset-y-0 border-x-2 border-white/20"></div>
                <div class="absolute top-1/2 left-0 right-0 h-0.5 bg-white/20"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-28 border-2 border-white/20 rounded-full"></div>
                ${players.map(p => createPlayerHTML(p)).join('')}
            `;
        }

        function renderPadelLayout(field) {
            field.innerHTML = `
                <div class="absolute inset-8 border-2 border-white/20"></div>
                <div class="absolute top-1/2 left-8 right-8 h-0.5 bg-white/30"></div>
                ${players.slice(0, 4).map((p, i) => {
                const pos = [{ x: 35, y: 30 }, { x: 65, y: 30 }, { x: 35, y: 70 }, { x: 65, y: 70 }][i];
                return createPlayerHTML({ ...p, ...pos });
            }).join('')}
            `;
        }

        function createPlayerHTML(p) {
            const isMe = p.name === "Thomas L." || p.pos === "Moi";
            return `
                <div class="player-spot absolute flex flex-col items-center gap-1 cursor-pointer transition-transform hover:scale-110 active:scale-90" 
                     style="left: ${p.x}%; top: ${p.y}%; transform: translate(-50%, -50%)"
                     onclick="${isMe ? '' : `openRatingModal('${p.name}', '${p.pos}', '${p.img}', ${p.id})`}">
                    <div class="size-12 rounded-full border-2 ${isMe ? 'border-primary' : 'border-white'} bg-slate-900 p-0.5 shadow-xl">
                        <img src="${p.img}" class="w-full h-full object-cover rounded-full">
                    </div>
                </div>
            `;
        }

        let currentRating = 0;
        function selectRating(n) {
            currentRating = n;
            document.querySelectorAll('.rating-btn').forEach(b => {
                if (parseInt(b.innerText) === n) b.classList.add('active');
                else b.classList.remove('active');
            });
        }

        function openRatingModal(name, pos, img, id) {
            const modal = document.getElementById('rating-modal');
            const content = modal.querySelector('div');
            document.getElementById('modal-player-name').innerText = name;
            document.getElementById('modal-player-pos').innerText = pos;
            document.getElementById('modal-player-img').src = img;

            modal.classList.remove('pointer-events-none');
            modal.classList.add('opacity-100');
            setTimeout(() => content.classList.remove('translate-y-full'), 50);
        }

        function closeRatingModal() {
            const modal = document.getElementById('rating-modal');
            const content = modal.querySelector('div');
            content.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                currentRating = 0;
                document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('textarea').value = '';
            }, 300);
        }

        function submitRating() {
            if (currentRating === 0) return alert("Note requise !");

            const name = document.getElementById('modal-player-name').innerText;
            const comment = document.querySelector('textarea').value;
            const currentUser = JSON.parse(localStorage.getItem('fivender_current_user')) || { name: "Anonyme" };

            const reviews = JSON.parse(localStorage.getItem('fivender_reviews') || '{}');
            if (!reviews[name]) reviews[name] = { ratings: [], comments: [] };

            reviews[name].ratings.push(currentRating);
            if (comment.trim()) {
                reviews[name].comments.push({
                    text: comment,
                    date: new Date().toLocaleDateString('fr-FR'),
                    author: currentUser.name
                });
            }
            localStorage.setItem('fivender_reviews', JSON.stringify(reviews));
            alert(`Note de ${currentRating}/10 pour ${name} !`);
            closeRatingModal();
        }
    </script>
</body>

</html>
