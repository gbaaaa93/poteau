<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#94FB2D",
            "background-light": "#F8FAFC",
          },
          fontFamily: {
            "display": ["Outfit", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-background-light text-slate-900 antialiased overflow-x-hidden">
  <div class="relative mx-auto h-screen max-w-[480px] bg-background-light flex flex-col shadow-2xl overflow-hidden">

    <!-- Header -->
    <header
      class="sticky top-0 z-50 bg-background-light/80 backdrop-blur-md px-4 py-4 border-b border-slate-100 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="history.back()"
          class="flex size-10 items-center justify-center bg-slate-100 rounded-full transition-colors active:scale-95">
          <span class="material-symbols-outlined text-slate-900">arrow_back</span>
        </button>
        <div class="flex items-center gap-3">
          <div class="size-10 rounded-2xl bg-primary/10 flex items-center justify-center border border-primary/20">
            <span class="material-symbols-outlined text-primary text-xl">sports_soccer</span>
          </div>
          <div class="flex flex-col">
            <h1 class="text-sm font-black italic uppercase tracking-tighter leading-none mb-1">Stade Charlety</h1>
            <div class="flex items-center gap-1.5 leading-none">
              <span class="size-1.5 rounded-full bg-primary animate-pulse"></span>
              <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">9 Joueurs actifs</p>
            </div>
          </div>
        </div>
      </div>
      <button class="size-10 flex items-center justify-center bg-slate-100 rounded-full">
        <span class="material-symbols-outlined text-slate-900">more_vert</span>
      </button>
    </header>

    <!-- Pinned Alert bar -->
    <div class="px-4 py-3 bg-white border-b border-slate-100">
      <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 flex items-center gap-3">
        <div class="size-10 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined text-black text-sm">location_on</span>
        </div>
        <div class="flex-1">
          <p class="text-[11px] font-black text-slate-900 italic leading-snug">Rdv Porte B — Entrée principale</p>
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Épinglé par l'organisateur</p>
        </div>
        <button
          class="text-[10px] font-black text-primary uppercase tracking-widest px-3 py-1 bg-white rounded-lg border border-primary/10">Plan</button>
      </div>
    </div>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar">
      <!-- Date separator -->
      <div class="flex justify-center">
        <span
          class="text-[9px] font-black px-4 py-1 rounded-full bg-slate-100 text-slate-400 uppercase tracking-widest">Aujourd'hui</span>
      </div>

      <!-- Incoming msg -->
      <div class="flex items-end gap-3 max-w-[85%]">
        <img
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuB15wfEfyZhDltBfBMwb6swqk3pdkR99t0X-u9XWP27L0R-pbwBU8oH9T0qKhShE5iAetgaNp8Eepi3ODl7y8hqt6LqpDfDMw809H3f5WfxUbbFGhsnUdLaCT4DhZy5ZTbxc4s-HG2ooWZ3M3q_4X-4aL-ArcD3dRWAYOdgDUtQ8Y0scuN28omZ9-a_B-8nXxLiJxVKLOFBSH0qUNWIU66x6Wp5uRyBpkYIsSdHfrEYx6k9SPYimxfb-uoh4_mRBpgyCNpitkegdA"
          class="size-8 rounded-xl object-cover">
        <div class="space-y-1">
          <p class="text-[10px] font-black text-slate-400 ml-1">LUCAS • 14:02</p>
          <div class="bg-white border border-slate-100 p-4 rounded-3xl rounded-bl-none shadow-sm">
            <p class="text-xs font-semibold text-slate-900 leading-relaxed">Quelqu'un peut ramener un ballon ? ⚽</p>
          </div>
        </div>
      </div>

      <!-- Outgoing msg -->
      <div class="flex items-end justify-end gap-3 ml-auto max-w-[85%]">
        <div class="space-y-1 text-right">
          <p class="text-[10px] font-black text-slate-400 mr-1">MOI • 14:05</p>
          <div class="bg-primary p-4 rounded-3xl rounded-br-none shadow-xl shadow-primary/10">
            <p class="text-xs font-black italic text-black leading-relaxed">Pas de souci, j'en ai un ! 💪</p>
          </div>
        </div>
        <div
          class="size-8 rounded-xl bg-slate-900 flex items-center justify-center text-[10px] font-black text-primary border-2 border-primary">
          MOI</div>
      </div>

      <!-- Suggestion bubble -->
      <div class="px-4">
        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 flex items-center justify-between gap-4">
          <div class="flex items-center gap-2">
            <div class="flex -space-x-2">
              <div class="size-6 rounded-full border-2 border-white bg-slate-200"></div>
              <div class="size-6 rounded-full border-2 border-white bg-slate-300"></div>
            </div>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Ajouter Marc en ami ?</p>
          </div>
          <button
            class="bg-primary text-black px-3 py-1.5 rounded-xl font-black text-[9px] uppercase shadow-sm">Ajouter</button>
        </div>
      </div>
    </main>

    <!-- Input Bar -->
    <footer class="p-6 bg-white border-t border-slate-100">
      <div class="flex items-center gap-3">
        <div
          class="flex-1 flex items-center bg-slate-50 border border-slate-100 rounded-2xl px-4 py-2 focus-within:ring-2 focus-within:ring-primary/20 transition-all">
          <span class="material-symbols-outlined text-slate-400 text-xl mr-2">sentiment_satisfied</span>
          <input type="text" placeholder="Ton message..."
            class="flex-1 bg-transparent border-none focus:ring-0 text-sm font-medium text-slate-900 placeholder:text-slate-300">
          <span class="material-symbols-outlined text-slate-400 text-xl ml-2">attach_file</span>
        </div>
        <button
          class="size-12 rounded-full bg-slate-900 flex items-center justify-center text-primary shadow-xl shadow-slate-900/10 active:scale-90 transition-transform">
          <span class="material-symbols-outlined font-black">send</span>
        </button>
      </div>
      <!-- iOS Indicator -->
      <div class="mt-6 flex justify-center">
        <div class="w-32 h-1 bg-slate-100 rounded-full"></div>
      </div>
    </footer>
  </div>
</body>

</html>
