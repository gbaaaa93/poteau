<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fivender - Bienvenue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #94FB2D;
            --primary-dark: #7ed624;
            --bg-light: #F8FAFC;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
        }
        .text-primary { color: #000; } /* Text on primary button is black */
        .bg-primary { background-color: var(--primary); }
        .input-focus:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(148, 251, 45, 0.1);
        }
        .toggle-btn.active {
            background-color: var(--primary);
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(148, 251, 45, 0.2);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">
    <div class="flex-1 flex flex-col p-6 max-w-md mx-auto w-full pt-16">
        <!-- Header -->
        <div class="flex flex-col items-center mb-10">
            <div class="size-16 bg-primary rounded-2xl flex items-center justify-center shadow-xl shadow-primary/20 mb-4">
                <span class="material-symbols-outlined text-black text-4xl font-bold">sports_soccer</span>
            </div>
            <h1 class="text-3xl font-black tracking-tight uppercase italic">Fivender</h1>
            <p class="text-slate-400 text-sm font-medium mt-1">La communauté Padel & Five</p>
        </div>

        <!-- Toggle Auth -->
        <div class="bg-slate-200/50 p-1.5 rounded-2xl flex mb-8">
            <button id="toggle-login" onclick="toggleAuth(true)" class="toggle-btn active flex-1 py-3 rounded-xl text-sm transition-all">Connexion</button>
            <button id="toggle-register" onclick="toggleAuth(false)" class="toggle-btn flex-1 py-3 rounded-xl text-sm transition-all text-slate-500">Inscription</button>
        </div>

        <!-- Login Form -->
        <div id="login-section" class="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email</label>
                <div class="relative">
                    <input type="email" id="login-email" placeholder="nom@exemple.com" class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-5 input-focus transition-all text-sm placeholder:text-slate-300">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Mot de passe</label>
                <div class="relative">
                    <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-5 input-focus transition-all text-sm placeholder:text-slate-300">
                </div>
            </div>
            <div class="text-right">
                <a href="#" class="text-xs font-semibold text-slate-400 hover:text-primary transition-colors">Mot de passe oublié ?</a>
            </div>
            <button onclick="handleLogin()" class="w-full bg-primary py-4 rounded-2xl text-black font-extrabold text-base shadow-lg shadow-primary/20 active:scale-95 transition-all mt-4">
                SE CONNECTER
            </button>

            <!-- Social Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ou continuer avec</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>

            <!-- Social Buttons -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="mockSocialLogin('Apple')" class="flex items-center justify-center gap-2 py-4 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors shadow-sm">
                    <svg class="size-5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.96.95-2.23 1.5-3.71 1.5-1.47 0-2.32-.44-3.5-.44-1.19 0-2.14.44-3.54.44-1.48 0-2.88-.63-3.84-1.59-2-1.99-2-6.34 0-8.33.96-.96 2.22-1.51 3.55-1.51 1.19 0 2.11.44 3.3.44 1.18 0 1.95-.44 3.3-.44 1.05 0 2.05.35 2.87.97-2.65 1.56-2.22 5.16.48 6.36-.61 1.48-1.46 2.65-2.41 3.6zm-3.82-13.62c0-.07.01-.15.01-.22 0-2.18-1.77-3.95-3.95-3.95-.07 0-.14 0-.21.01.21 2.15 2.04 3.84 4.15 4.16z"/></svg>
                    <span class="text-sm font-bold">Apple</span>
                </button>
                <button onclick="mockSocialLogin('Google')" class="flex items-center justify-center gap-2 py-4 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors shadow-sm">
                    <svg class="size-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span class="text-sm font-bold">Google</span>
                </button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-section" class="space-y-4 hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Nom complet</label>
                <input type="text" id="reg-name" placeholder="Ex: Thomas Lucas" class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-5 input-focus transition-all text-sm placeholder:text-slate-300">
            </div>
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email</label>
                <input type="email" id="reg-email" placeholder="votre@email.com" class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-5 input-focus transition-all text-sm placeholder:text-slate-300">
            </div>
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Mot de passe</label>
                <input type="password" id="reg-password" placeholder="Créer un mot de passe" class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-5 input-focus transition-all text-sm placeholder:text-slate-300">
            </div>
            <button onclick="handleRegister()" class="w-full bg-primary py-4 rounded-2xl text-black font-extrabold text-base shadow-lg shadow-primary/20 active:scale-95 transition-all mt-4">
                CRÉER MON COMPTE
            </button>

            <!-- Social Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ou s'inscrire avec</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>

            <!-- Social Buttons -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="mockSocialLogin('Apple')" class="flex items-center justify-center gap-2 py-4 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors shadow-sm">
                    <svg class="size-5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.96.95-2.23 1.5-3.71 1.5-1.47 0-2.32-.44-3.5-.44-1.19 0-2.14.44-3.54.44-1.48 0-2.88-.63-3.84-1.59-2-1.99-2-6.34 0-8.33.96-.96 2.22-1.51 3.55-1.51 1.19 0 2.11.44 3.3.44 1.18 0 1.95-.44 3.3-.44 1.05 0 2.05.35 2.87.97-2.65 1.56-2.22 5.16.48 6.36-.61 1.48-1.46 2.65-2.41 3.6zm-3.82-13.62c0-.07.01-.15.01-.22 0-2.18-1.77-3.95-3.95-3.95-.07 0-.14 0-.21.01.21 2.15 2.04 3.84 4.15 4.16z"/></svg>
                    <span class="text-sm font-bold">Apple</span>
                </button>
                <button onclick="mockSocialLogin('Google')" class="flex items-center justify-center gap-2 py-4 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors shadow-sm">
                    <svg class="size-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span class="text-sm font-bold">Google</span>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-auto pb-8 text-center">
            <p class="text-[11px] text-slate-400 font-medium">En vous connectant, vous acceptez nos <br> <span class="text-slate-900 underline">Conditions Générales</span></p>
        </div>
    </div>

    <script>
        function toggleAuth(showLogin) {
            document.getElementById('login-section').classList.toggle('hidden', !showLogin);
            document.getElementById('register-section').classList.toggle('hidden', showLogin);
            
            document.getElementById('toggle-login').classList.toggle('active', showLogin);
            document.getElementById('toggle-login').classList.toggle('text-slate-500', !showLogin);
            
            document.getElementById('toggle-register').classList.toggle('active', !showLogin);
            document.getElementById('toggle-register').classList.toggle('text-slate-500', showLogin);
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            if (!name || !email || !password) {
                showToast("Veuillez remplir tous les champs");
                return;
            }

            const users = JSON.parse(localStorage.getItem('fivender_users') || '[]');
            if (users.find(u => u.email === email)) {
                showToast("Cet email est déjà utilisé");
                return;
            }

            const newUser = {
                id: Date.now(),
                name,
                email,
                password,
                level: "Débutant",
                matches: [],
                img: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=200&h=200"
            };

            users.push(newUser);
            localStorage.setItem('fivender_users', JSON.stringify(users));
            showToast("Compte créé avec succès ! Connecte-toi.");
            toggleAuth(true);
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const users = JSON.parse(localStorage.getItem('fivender_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('fivender_current_user', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                showToast("Identifiants incorrects");
            }
        }

        function mockSocialLogin(provider) {
            showToast(`Connexion avec ${provider} (Simulée)`);
            const mockUser = {
                id: Date.now(),
                name: provider === "Apple" ? "Utilisateur Apple" : "Utilisateur Google",
                email: `${provider.toLowerCase()}@fivender.app`,
                level: "Intermédiaire",
                img: provider === "Apple" ? "https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?auto=format&fit=crop&w=200&h=200" : "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?auto=format&fit=crop&w=200&h=200"
            };
            localStorage.setItem('fivender_current_user', JSON.stringify(mockUser));
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }

        function showToast(msg) {
            // Simple alert fallback for mock
            alert(msg);
        }
    </script>
</body>
</html>
