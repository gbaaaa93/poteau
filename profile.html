<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#94FB2D",
                        "background-light": "#F8FAFC",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light text-slate-900 antialiased">

    <script>
        const currentUser = JSON.parse(localStorage.getItem('fivender_current_user'));
        if (!currentUser && !window.location.href.includes('login.html')) {
            window.location.href = 'login.html';
        }
    </script>

    <div class="relative mx-auto min-h-screen max-w-[480px] bg-background-light flex flex-col pb-24 shadow-2xl">
        <!-- Top Navigation Bar -->
        <div
            class="sticky top-0 z-50 flex items-center bg-background-light/80 backdrop-blur-md px-4 py-4 justify-between border-b border-slate-100">
            <button onclick="history.back()"
                class="flex size-10 shrink-0 items-center justify-center bg-slate-100 rounded-full transition-colors active:scale-90">
                <span class="material-symbols-outlined text-slate-900">arrow_back</span>
            </button>
            <h2 class="text-slate-900 text-lg font-black leading-tight tracking-tight flex-1 text-center italic">PROFIL
            </h2>
            <div class="flex size-10 items-center justify-center bg-slate-100 rounded-full">
                <span class="material-symbols-outlined text-slate-900">more_horiz</span>
            </div>
        </div>

        <!-- Profile Header Section -->
        <div class="px-6 py-8">
            <div class="flex flex-col items-center text-center gap-4">
                <div class="relative">
                    <div class="flex h-32 w-32 items-center justify-center rounded-[2.5rem] bg-slate-900 text-primary text-4xl font-black shadow-2xl rotate-3"
                        id="user-initials">
                        --
                    </div>
                    <!-- Premium Badge -->
                    <div
                        class="absolute -bottom-2 -right-2 bg-primary text-black px-3 py-1 rounded-full text-[10px] font-black shadow-lg shadow-primary/30 uppercase tracking-widest border-2 border-background-light">
                        Premium
                    </div>
                </div>
                <div class="mt-2">
                    <h1 id="profile-name" class="text-3xl font-black text-slate-900 italic tracking-tighter">
                        Chargement...</h1>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Joueur de Five • Paris
                    </p>
                </div>
            </div>
        </div>

        <!-- Stats & Form Table -->
        <div class="px-6 space-y-6">
            <!-- Ratings Section -->
            <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-xl shadow-slate-200/50 space-y-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Note
                            Globale</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span id="rating-value" class="text-3xl font-black text-slate-900">0.0</span>
                            <span class="material-symbols-outlined text-primary fill-1">star</span>
                        </div>
                    </div>
                    <div id="self-actions" class="hidden">
                        <button
                            class="bg-slate-100 text-slate-900 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider active:scale-95 transition-transform">Éditer</button>
                    </div>
                </div>

                <div class="space-y-3" id="recent-form-container" style="display: none;">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Forme Récente (SofaScore
                        Style)</p>
                    <div class="flex gap-2" id="form-circles">
                        <!-- Circles will be injected if reviews exist -->
                    </div>
                </div>
            </div>

            <!-- Action Buttons (Conditional) -->
            <div id="other-actions" class="grid grid-cols-2 gap-3">
                <button
                    class="flex items-center justify-center gap-2 py-4 bg-primary rounded-2xl font-black text-black shadow-xl shadow-primary/20 active:scale-95 transition-all">
                    <span class="material-symbols-outlined font-black">person_add</span>
                    AJOUTER
                </button>
                <button
                    class="flex items-center justify-center gap-2 py-4 bg-slate-900 rounded-2xl font-black text-white shadow-xl shadow-slate-900/10 active:scale-95 transition-all">
                    <span class="material-symbols-outlined">chat_bubble</span>
                    MESSAGE
                </button>
            </div>

            <!-- Reviews container -->
            <div class="space-y-4">
                <h3 class="text-sm font-black text-slate-900 italic uppercase ml-2 tracking-tighter">Derniers Avis</h3>
                <div id="reviews-container" class="space-y-3">
                    <p
                        class="text-xs text-slate-400 italic text-center py-6 bg-white rounded-3xl border border-slate-50">
                        Aucun avis reçu pour le moment.</p>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="pt-6 space-y-3">
                <button onclick="handleLogout()"
                    class="w-full py-4 text-red-500 font-black uppercase text-xs tracking-widest border-2 border-red-500/10 rounded-2xl hover:bg-red-500/5 active:scale-95 transition-all">
                    Se Déconnecter
                </button>
                <button onclick="handleResetAll()"
                    class="w-full py-2 text-slate-300 font-bold uppercase text-[8px] tracking-[0.2em] hover:text-red-400 transition-colors">
                    Réinitialiser les données
                </button>
            </div>
        </div>

        <!-- Navigation -->
        <nav
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-background-light border-t border-slate-200 px-6 py-3 flex justify-between items-center z-50">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="dashboard.html">
                <span class="material-symbols-outlined">explore</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Matchs</span>
            </a>
            <div class="relative -top-8">
                <a href="create_match.html"
                    class="w-14 h-14 bg-primary text-black rounded-full shadow-xl shadow-primary/40 flex items-center justify-center border-4 border-background-light transform transition-transform active:scale-90">
                    <span class="material-symbols-outlined text-2xl font-black">add</span>
                </a>
            </div>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="community.html">
                <span class="material-symbols-outlined">forum</span>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Chat</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary" href="profile.html">
                <span class="material-symbols-outlined fill-1">person</span>
                <span class="text-[10px] font-extrabold uppercase tracking-tighter">Profil</span>
            </a>
        </nav>
    </div>

    <script>
        function loadPlayerData() {
            if (!currentUser) return;

            const urlParams = new URLSearchParams(window.location.search);
            const nameParam = urlParams.get('name');

            let profileUser = currentUser;
            const nameDisplay = document.getElementById('profile-name');
            const initialsDisplay = document.getElementById('user-initials');

            if (nameParam && nameParam !== currentUser.name) {
                nameDisplay.innerText = nameParam.toUpperCase();
                initialsDisplay.innerText = nameParam.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('self-actions').classList.add('hidden');
                document.getElementById('other-actions').classList.remove('hidden');
                profileUser = { name: nameParam };
            } else {
                nameDisplay.innerText = currentUser.name.toUpperCase();
                initialsDisplay.innerText = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('self-actions').classList.remove('hidden');
                document.getElementById('other-actions').classList.add('hidden');
            }

            const playerName = nameDisplay.innerText.trim();
            const allReviews = JSON.parse(localStorage.getItem('fivender_reviews') || '{}');
            const playerData = allReviews[playerName];

            if (playerData) {
                if (playerData.ratings.length > 0) {
                    document.getElementById('recent-form-container').style.display = 'block';
                    const avg = playerData.ratings.reduce((a, b) => a + b, 0) / playerData.ratings.length;
                    document.getElementById('rating-value').innerText = avg.toFixed(1);
                    
                    // Render simple form circles based on last 3 ratings
                    const formContainer = document.getElementById('form-circles');
                    formContainer.innerHTML = playerData.ratings.slice(-3).reverse().map(r => `
                        <div class="flex flex-col items-center gap-1">
                            <div class="size-10 rounded-xl ${r >= 7 ? 'bg-primary' : 'bg-slate-200'} flex items-center justify-center text-black text-xs font-black shadow-sm">
                                ${r.toFixed(1)}
                            </div>
                        </div>
                    `).join('');
                }

                if (playerData.comments.length > 0) {
                    const container = document.getElementById('reviews-container');
                    container.innerHTML = playerData.comments.reverse().map(comment => `
                    <div class="p-5 rounded-3xl bg-white border border-slate-100 shadow-sm space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-primary uppercase tracking-widest">De ${comment.author}</span>
                            <span class="text-[8px] font-bold text-slate-400 font-mono">${comment.date}</span>
                        </div>
                        <p class="text-xs text-slate-600 leading-relaxed font-medium italic">"${comment.text}"</p>
                    </div>
                `).join('');
                }
            }
        }

        function handleLogout() {
            localStorage.removeItem('fivender_current_user');
            window.location.href = 'login.html';
        }

        function handleResetAll() {
            if (confirm("Attention : Cela va supprimer TOUTES les données (utilisateurs, avis, session). Continuer ?")) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        window.onload = loadPlayerData;
    </script>
</body>

</html>
