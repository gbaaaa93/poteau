<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#94FB2D",
                        "background-light": "#F8FAFC",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body class="bg-background-light text-slate-900 antialiased overflow-x-hidden">
    <div class="relative mx-auto min-h-screen max-w-[480px] bg-background-light flex flex-col shadow-2xl">

        <!-- Header -->
        <header
            class="sticky top-0 z-50 bg-background-light/80 backdrop-blur-md px-4 py-4 border-b border-slate-100 flex items-center justify-between">
            <button onclick="history.back()"
                class="flex size-10 items-center justify-center bg-slate-100 rounded-full transition-colors active:scale-95">
                <span class="material-symbols-outlined text-slate-900">arrow_back</span>
            </button>
            <h2 class="text-slate-900 text-lg font-black italic uppercase tracking-tighter flex-1 text-center">Paramètres</h2>
            <div class="size-10 flex items-center justify-center bg-slate-100 rounded-full">
                <span class="material-symbols-outlined text-slate-900">settings</span>
            </div>
        </header>

        <main class="flex-1 p-6 space-y-8">
            <!-- Account Section -->
            <section class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Compte</h3>
                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                    <button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-slate-400">person</span>
                            <span class="text-sm font-semibold">Informations personnelles</span>
                        </div>
                        <span class="material-symbols-outlined text-slate-300">chevron_right</span>
                    </button>
                    <div class="h-[1px] bg-slate-50 mx-4"></div>
                    <button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-slate-400">notifications</span>
                            <span class="text-sm font-semibold">Notifications</span>
                        </div>
                        <span class="material-symbols-outlined text-slate-300">chevron_right</span>
                    </button>
                </div>
            </section>

            <!-- Preferences Section -->
            <section class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Préférences</h3>
                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                    <button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-slate-400">language</span>
                            <span class="text-sm font-semibold">Langue</span>
                        </div>
                        <span class="text-xs font-bold text-slate-300">Français</span>
                    </button>
                </div>
            </section>

            <!-- Actions Section -->
            <section class="space-y-4 pt-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2 text-red-400">Danger Zone</h3>
                <div class="space-y-3">
                    <button onclick="handleLogout()"
                        class="w-full py-5 bg-white text-slate-900 border border-slate-200 rounded-[2rem] font-black text-sm uppercase tracking-widest italic shadow-sm active:scale-95 transition-all flex items-center justify-center gap-3">
                        <span class="material-symbols-outlined">logout</span>
                        Se Déconnecter
                    </button>
                    <button onclick="handleResetAll()"
                        class="w-full py-3 text-red-500 font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-red-50 transition-colors rounded-2xl">
                        Réinitialiser toutes les données
                    </button>
                </div>
            </section>
        </main>

        <footer class="p-6 text-center">
            <p class="text-[10px] font-black text-slate-200 uppercase tracking-[0.3em]">Fivender v1.0.0</p>
        </footer>
    </div>

    <script>
        function handleLogout() {
            localStorage.removeItem('fivender_current_user');
            window.location.href = 'login.html';
        }

        function handleResetAll() {
            if (confirm("Attention : Cela va supprimer TOUTES les données (utilisateurs, avis, session). Continuer ?")) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>

</html>
