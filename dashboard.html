<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mes Activités - Fivender</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#94FB2D",
                        "background-light": "#F8FAFC",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light text-slate-900 antialiased min-h-screen flex flex-col">
    <div class="relative mx-auto min-h-screen max-w-[480px] bg-background-light flex flex-col pb-24 shadow-2xl">
        <header class="sticky top-0 z-20 bg-background-light/95 backdrop-blur-md border-b border-slate-200">
            <div class="flex items-center p-4 justify-between max-w-full mx-auto w-full">
                <h1 class="text-xl font-bold tracking-tight">Mes Activités</h1>
                <button
                    class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 transition-colors">
                    <span class="material-symbols-outlined text-primary">calendar_month</span>
                </button>
            </div>
            <nav class="flex px-4 gap-6 max-w-full mx-auto w-full overflow-x-auto hide-scrollbar">
                <a id="tab-upcoming"
                    class="flex flex-col items-center justify-center border-b-2 border-primary text-slate-900 pb-3 pt-2 cursor-pointer"
                    onclick="switchDashboardTab('upcoming')">
                    <span class="text-sm font-bold whitespace-nowrap">À venir</span>
                </a>
                <a id="tab-past"
                    class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 pb-3 pt-2 cursor-pointer"
                    onclick="switchDashboardTab('past')">
                    <span class="text-sm font-medium whitespace-nowrap">Passés</span>
                </a>
                <a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 pb-3 pt-2"
                    href="#">
                    <span class="text-sm font-medium whitespace-nowrap">Organisés</span>
                </a>
            </nav>
        </header>
        <main class="flex-1 max-w-full mx-auto w-full p-4 pb-24 space-y-6">
            <div id="content-area" class="space-y-6">
                <!-- Contenu dynamique -->
            </div>
        </main>

        <nav
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-background-light border-t border-slate-200 px-6 py-3 flex justify-between items-center z-50">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-medium">Accueil</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary" href="dashboard.html">
                <span class="material-symbols-outlined fill-1">explore</span>
                <span class="text-[10px] font-medium">Matchs</span>
            </a>
            <div class="relative -top-8">
                <a href="create_match.html"
                    class="w-14 h-14 bg-primary text-black rounded-full shadow-lg shadow-primary/40 flex items-center justify-center border-4 border-background-light">
                    <span class="material-symbols-outlined text-2xl font-bold">add</span>
                </a>
            </div>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="alert.html">
                <span class="material-symbols-outlined">notifications</span>
                <span class="text-[10px] font-medium">Alertes</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="profile.html">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </nav>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('fivender_current_user'));
        if (!currentUser) window.location.href = 'login.html';

        // Mock logic: New users see empty, old users see history
        const isNewUser = true; // Forcing clean state for now until real storage is linked

        function switchDashboardTab(tab) {
            const area = document.getElementById('content-area');
            const tabUpcoming = document.getElementById('tab-upcoming');
            const tabPast = document.getElementById('tab-past');

            if (tab === 'past') {
                tabPast.classList.remove('border-transparent', 'text-slate-500');
                tabPast.classList.add('border-primary', 'text-slate-900');
                tabUpcoming.classList.add('border-transparent', 'text-slate-500');
                tabUpcoming.classList.remove('border-primary', 'text-slate-900');

                if (isNewUser) {
                    area.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center space-y-4">
                        <span class="material-symbols-outlined text-6xl text-slate-200">history</span>
                        <p class="text-slate-500 font-medium">Aucun match passé pour le moment.</p>
                    </div>
                `;
                } else {
                    area.innerHTML = `
                    <section class="space-y-4">
                        <div class="bg-white rounded-2xl overflow-hidden border border-slate-200 shadow-sm p-4">
                             <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-primary">
                                    <span class="material-symbols-outlined">sports_soccer</span>
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold">Five 5v5 • Urban Soccer</h3>
                                    <p class="text-xs text-slate-500">Hier • 20:00</p>
                                </div>
                                <a href="match_review.html?id=1" class="text-xs font-bold text-primary bg-primary/10 px-3 py-2 rounded-lg">NOTER</a>
                             </div>
                        </div>
                    </section>
                `;
                }
            } else {
                tabUpcoming.classList.remove('border-transparent', 'text-slate-500');
                tabUpcoming.classList.add('border-primary', 'text-slate-900');
                tabPast.classList.add('border-transparent', 'text-slate-500');
                tabPast.classList.remove('border-primary', 'text-slate-900');

                area.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-center space-y-4">
                    <span class="material-symbols-outlined text-6xl text-slate-200">calendar_today</span>
                    <p class="text-slate-500 font-medium">Aucun match à venir.</p>
                    <a href="index.html" class="bg-primary text-black px-6 py-2 rounded-xl text-sm font-bold uppercase">Trouver un match</a>
                </div>
            `;
            }
        }

        window.onload = () => switchDashboardTab('upcoming');
    </script>
</body>

</html>
